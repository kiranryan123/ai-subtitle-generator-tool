[audio]
# "loopback" captures system audio where supported; "microphone" captures mic input.
source = "loopback"
device_name = ""
sample_rate = 16000
chunk_seconds = 1.0
silence_rms = 0.02

[speech]
model_size = "base"
language = "auto"
beam_size = 1
compute_type = "int8"
cpu_threads = 4
allowed_languages = "zh,en"
min_language_probability = 0.45
no_speech_threshold = 0.6

[overlay]
font_family = "Microsoft YaHei UI"
font_size = 30
bottom_margin = 110
max_width_ratio = 0.86
background = "#000000"
foreground = "#ffffff"
alpha = 0.72
max_history = 1
caption_lifetime_seconds = 10.0
