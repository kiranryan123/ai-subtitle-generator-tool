[audio]
# "loopback" captures system audio where supported; "microphone" captures mic input.
source = "loopback"
device_name = ""
sample_rate = 16000
chunk_seconds = 1.0
silence_rms = 0.02

[asr]
provider = "vosk"
language = "zh"
model_path = "models/vosk-model-small-cn-0.22"

[overlay]
font_family = "Microsoft YaHei UI"
font_size = 30
bottom_margin = 110
max_width_ratio = 0.86
background = "#000000"
foreground = "#ffffff"
alpha = 0.72
max_history = 3
caption_lifetime_seconds = 10.0
