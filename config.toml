[audio]
# "loopback" captures system audio where supported; "microphone" captures mic input.
source = "loopback"
device_name = ""
sample_rate = 16000
chunk_seconds = 1.5
silence_rms = 0.02

[speech]
model_size = "base"
language = "auto"
beam_size = 3
compute_type = "int8"

[overlay]
font_family = "Microsoft YaHei UI"
font_size = 30
bottom_margin = 110
max_width_ratio = 0.86
background = "#000000"
foreground = "#ffffff"
alpha = 0.72
